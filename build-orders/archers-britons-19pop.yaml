id: archers-britons-19pop
name: "19pop Fast Archers (Britons)"
civilization: Britons
author: lnz
description: "Very fast Feudal time using the Britons' sheep bonus, into faster-producing Ranges and longer-range Archers for an early advantage."
tags: [archers, feudal-aggression, britons, fast-feudal]
difficulty: intermediate
glyph: 1FA

steps:
  - action: "2 houses, then all 3 vills to sheep; queue villagers"
    at: { time_seconds: 0 }
    target_time_seconds: 0
    phase: dark
    villagers_assigned: { food: 3, wood: 0, gold: 0, stone: 0, idle: 0 }
  - action: "5 on sheep"
    at: { villagers: 5 }
    target_time_seconds: 60
    phase: dark
    villagers_assigned: { food: 5, wood: 0, gold: 0, stone: 0, idle: 0 }
  - action: "Build lumber camp, 2 on wood"
    at: { villagers: 7 }
    target_time_seconds: 120
    phase: dark
    villagers_assigned: { food: 5, wood: 2, gold: 0, stone: 0, idle: 0 }
  - action: "Lure first boar"
    at: { villagers: 8 }
    target_time_seconds: 150
    phase: dark
    notes: "Garrison the lurer in TC after a single shot. Don't let the boar rot."
    villagers_assigned: { food: 6, wood: 2, gold: 0, stone: 0, idle: 0 }
  - action: "+3 on sheep/boar"
    at: { villagers: 11 }
    target_time_seconds: 240
    phase: dark
    notes: "Push 2 deer here if you can — recommended."
    villagers_assigned: { food: 9, wood: 2, gold: 0, stone: 0, idle: 0 }
  - action: "House, mill on berries, 2 to berries"
    at: { villagers: 13 }
    target_time_seconds: 300
    phase: dark
    villagers_assigned: { food: 11, wood: 2, gold: 0, stone: 0, idle: 0 }
  - action: "Lure second boar; +2 to sheep/boar"
    at: { villagers: 15 }
    target_time_seconds: 360
    phase: dark
    notes: "Lure 2nd boar at ~150 food left on the 1st. Take sheep in groups of ~5 if boar runs out."
    villagers_assigned: { food: 13, wood: 2, gold: 0, stone: 0, idle: 0 }
  - action: "+2 to wood"
    at: { villagers: 17 }
    target_time_seconds: 420
    phase: dark
    villagers_assigned: { food: 13, wood: 4, gold: 0, stone: 0, idle: 0 }
  - action: "Mining camp + 1 on gold, research Loom, click Feudal Age"
    at: { villagers: 18 }
    target_time_seconds: 450
    phase: dark
    notes: "Take 7 vills off sheep and send them to wood. Before 60% to Feudal, build Barracks, then a House."
    villagers_assigned: { food: 6, wood: 11, gold: 1, stone: 0, idle: 0 }
  - action: "In Feudal: 2 vills build Archery Range; research Double-Bit Axe and Horse Collar"
    at: { villagers: 19 }
    target_time_seconds: 600
    phase: feudal
    notes: "Keep queuing villagers from the TC."
  - action: "Up to 5 on gold"
    at: { villagers: 22 }
    target_time_seconds: 690
    phase: feudal
    notes: "If you didn't push deer earlier, send your shepherds to berries."
    villagers_assigned: { food: 11, wood: 11, gold: 5, stone: 0, idle: 0 }
  - action: "2 vills to farms"
    at: { villagers: 24 }
    target_time_seconds: 750
    phase: feudal
    notes: "Keep adding farms as wood comes in, and houses as needed."
  - action: "Build Blacksmith, research Fletching, build 2nd Lumber Camp, move out"
    at: { villagers: 25 }
    target_time_seconds: 810
    phase: feudal
    notes: "8 archers with Fletching can two-shot a villager. Send extra vills to wood."
