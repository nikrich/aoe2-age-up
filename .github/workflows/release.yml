name: Release

on:
  push:
    branches:
      - main

jobs:
  build-windows:
    permissions:
      contents: write
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install Tesseract OCR
        shell: pwsh
        run: |
          choco install tesseract -y --no-progress
          $tessPath = "C:\Program Files\Tesseract-OCR"

          # Copy binary as Tauri sidecar (must match target triple)
          New-Item -Path "src-tauri\binaries" -ItemType Directory -Force
          Copy-Item "$tessPath\tesseract.exe" "src-tauri\binaries\tesseract-x86_64-pc-windows-msvc.exe"

          # Copy DLLs and tessdata for bundling
          New-Item -Path "src-tauri\tesseract-deps\tessdata" -ItemType Directory -Force
          Get-ChildItem "$tessPath\*.dll" | Copy-Item -Destination "src-tauri\tesseract-deps\"
          Copy-Item "$tessPath\tessdata\eng.traineddata" "src-tauri\tesseract-deps\tessdata\"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: app-v__VERSION__
          releaseName: "Age Up v__VERSION__"
          releaseBody: "Download the .msi or .exe installer from the assets below."
          releaseDraft: true
          prerelease: false
